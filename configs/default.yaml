seed: 0
deterministic: false

checkpoint_config:
  interval: 1
  max_keep_ckpts: 1

log_config:
  interval: 50
  hooks:
    -
      type: TextLoggerHook
    -
      type: TensorboardLoggerHook

load_from: null
resume_from: null

cudnn_benchmark: false
fp16:
  loss_scale: 
    growth_interval: 2000

max_epochs: 6 # 20  # 默认 6 轮，具体模型配置可能覆盖此值
runner:
  type: CustomEpochBasedRunner
  max_epochs: ${max_epochs}
