# Distance-Adaptive Voxelization Configuration with Small Object Optimization
# Scheme A: Lightweight improvements for small object detection
# Compatible with torchpack dist-run command line interface

voxel_size: [0.075, 0.075, 0.2]
point_cloud_range: [-54.0, -54.0, -5.0, 54.0, 54.0, 3.0]

# Distance-adaptive voxelization configurations
voxel_configs:
  - range: [0, 20]
    voxel_size: [0.05, 0.05, 0.1]
    max_voxels: 50000
  
  - range: [20, 40]
    voxel_size: [0.075, 0.075, 0.15]
    max_voxels: 80000
  
  - range: [40, 54]
    voxel_size: [0.15, 0.15, 0.3]
    max_voxels: 40000

model:
  encoders:
    camera:
      backbone:
        type: SwinTransformer
        embed_dims: 96
        depths: [2, 2, 6, 2]
        num_heads: [3, 6, 12, 24]
        window_size: 7
        mlp_ratio: 4
        qkv_bias: true
        qk_scale: null
        drop_rate: 0.
        attn_drop_rate: 0.
        drop_path_rate: 0.2
        patch_norm: true
        out_indices: [1, 2, 3]
        with_cp: false
        convert_weights: true
        init_cfg:
          type: Pretrained
          checkpoint: https://github.com/SwinTransformer/storage/releases/download/v1.0.0/swin_tiny_patch4_window7_224.pth
      neck:
        in_channels: [192, 384, 768]
      vtransform:
        xbound: [-54.0, 54.0, 0.3]
        ybound: [-54.0, 54.0, 0.3]
    
    lidar:
      voxelize:
        type: DistanceAdaptiveVoxelization
        voxel_configs: ${voxel_configs}
        point_cloud_range: ${point_cloud_range}
        max_num_points: 10
      
      backbone:
        type: MultiResSparseEncoder
        in_channels: 5
        base_config:
          out_channels: 128
          use_cbam: true  # Enable CBAM attention
          cbam_ratio: 16  # CBAM reduction ratio
          kwargs:
            order: ['conv', 'norm', 'act']
            encoder_channels:
              - [16, 16, 32]
              - [32, 32, 64]
              - [64, 64, 128]
              - [128, 128]
            block_type: basicblock
        zone_configs: ${voxel_configs}

  fuser:
    type: ConvFuser
    in_channels: [80, 128]
    out_channels: 256

  heads:
    object:
      train_cfg:
        grid_size: [1440, 1440, 41]
        # Small object optimization: specialized anchor sizes
        anchor_sizes:
          - class_names: ['car', 'truck', 'construction_vehicle', 'bus', 'trailer']
            sizes: [[2.0, 2.0, 1.5], [2.5, 2.5, 2.0]]
          - class_names: ['pedestrian', 'motorcycle', 'bicycle']
            sizes: [[0.6, 0.6, 1.6], [0.8, 0.8, 1.8]]  # Smaller anchors
          - class_names: ['traffic_cone', 'barrier']
            sizes: [[0.4, 0.4, 1.0], [0.5, 0.5, 1.2]]  # Even smaller anchors
        anchor_strides: [0.2, 0.2, 0]  # Denser anchor distribution
        anchor_offset: [0.1, 0.1, 0]
        
        # Small object loss weighting
        loss_cls:
          type: FocalLoss
          use_sigmoid: true
          gamma: 2.0
          alpha: 0.25
          loss_weight: 1.5  # Increased weight for classification
        
        loss_bbox:
          type: SmoothL1Loss
          loss_weight: 2.0  # Increased weight for bbox regression
        
        loss_heatmap:
          type: GaussianFocalLoss
          alpha: 2.0
          gamma: 4.0
          loss_weight: 1.5  # Increased weight for heatmap
        
        # Class-specific loss weights (higher for small objects)
        class_weights:
          - 1.0  # car
          - 1.0  # truck
          - 1.0  # construction_vehicle
          - 1.0  # bus
          - 1.0  # trailer
          - 2.0  # pedestrian (2x weight)
          - 2.5  # motorcycle (2.5x weight)
          - 2.5  # bicycle (2.5x weight)
          - 3.0  # traffic_cone (3x weight)
          - 3.0  # barrier (3x weight)
      
      test_cfg:
        grid_size: [1440, 1440, 41]
        # Small object optimization: lower NMS threshold
        nms_type: rotate
        nms_thresh: 0.2  # Lower threshold for small objects
        score_thresh: 0.1
        post_max_size: 80
        pre_max_size: 500

# Data augmentation with Copy-Paste for small objects
data:
  train:
    copy_paste:
      type: CopyPaste3D
      classes: ['pedestrian', 'motorcycle', 'bicycle', 'traffic_cone', 'barrier']
      max_num_pasted: 10
      paste_probability: 0.5
      scale_range: [0.9, 1.1]
      rotate_range: [-0.157, 0.157]
  
  samples_per_gpu: 2
  workers_per_gpu: 2

# Learning rate configuration
lr_config:
  policy: CosineAnnealing
  warmup: linear
  warmup_iters: 500
  warmup_ratio: 0.33333333
  min_lr_ratio: 1.0e-3

optimizer:
  lr: 2.0e-4
  weight_decay: 0.01

# Training schedule
train_cfg:
  max_epochs: 6  # Can be increased to 20 for large-scale training
